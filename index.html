<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Poke-Trunfo</title>
    <meta name="description" content="A modern implementation of the classic Super Trumps game featuring Pokémon." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1881797135791796"
    crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b; /* zinc-950 */
        height: 100vh;
        width: 100vw;
        overflow-x: hidden; /* Prevent scrolling globally */
      }
      #root {
        height: 100%;
        width: 100%;
      }
      
      /* Custom scrollbar for better aesthetics inside containers if needed */
      ::-webkit-scrollbar {
        width: 4px; /* Thinner for mobile */
      }
      ::-webkit-scrollbar-track {
        background: #18181b;
      }
      ::-webkit-scrollbar-thumb {
        background: #22c55e;
        border-radius: 4px;
      }

      /* 3D Card Animation Utilities */
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      /* CRITICAL: Added for vertical button flip */
      .rotate-x-180 {
        transform: rotateX(180deg);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-zinc-950 text-white antialiased selection:bg-green-500 selection:text-black">

  <!-- Conteúdo estático para crawlers — oculto visualmente após o React carregar -->
  <noscript>
    <div style="max-width:800px;margin:0 auto;padding:2rem;color:#fff;font-family:Inter,sans-serif">
      <h1 style="font-size:2rem;font-weight:900;color:#22c55e;margin-bottom:1rem">PokéTrunfo</h1>
      <p style="margin-bottom:1rem">PokéTrunfo é uma versão digital moderna do clássico jogo Super Trunfo, com cartas de Pokémon. Compare os atributos dos seus Pokémon e vença todas as rodadas!</p>

      <h2 style="font-size:1.5rem;font-weight:700;margin:1.5rem 0 0.5rem">Como jogar</h2>
      <p style="margin-bottom:0.5rem">Cada jogador recebe uma carta com um Pokémon e seus atributos: HP, Ataque, Defesa, Ataque Especial, Defesa Especial e Velocidade.</p>
      <p style="margin-bottom:0.5rem">Escolha o atributo que você acredita ser maior que o do adversário. Se o seu for maior, você vence a rodada e fica com a carta do oponente.</p>
      <p style="margin-bottom:1rem">O objetivo é colecionar todas as cartas do adversário. Quem ficar sem cartas perde!</p>

      <h2 style="font-size:1.5rem;font-weight:700;margin:1.5rem 0 0.5rem">Atributos das cartas</h2>
      <ul style="padding-left:1.5rem;margin-bottom:1rem">
        <li><strong>HP</strong> — Pontos de vida do Pokémon</li>
        <li><strong>Ataque</strong> — Poder de ataque físico</li>
        <li><strong>Defesa</strong> — Resistência a ataques físicos</li>
        <li><strong>Ataque Especial</strong> — Poder de ataques especiais</li>
        <li><strong>Defesa Especial</strong> — Resistência a ataques especiais</li>
        <li><strong>Velocidade</strong> — Determina quem age primeiro</li>
      </ul>

      <h2 style="font-size:1.5rem;font-weight:700;margin:1.5rem 0 0.5rem">Sobre o projeto</h2>
      <p style="margin-bottom:0.5rem">PokéTrunfo é um projeto open source desenvolvido por Igor Fugiwara, engenheiro frontend em São Paulo. O jogo consome a <a href="https://pokeapi.co" style="color:#22c55e">PokéAPI</a> para carregar dados reais de mais de 900 Pokémon.</p>
      <p>Construído com React, TypeScript e Tailwind CSS.</p>
    </div>
  </noscript>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
